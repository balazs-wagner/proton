---
format_version: '26'
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git
project_type: other
workflows:
  deploy:
    steps:
    - activate-ssh-key@4:
        run_if: '{{getenv "SSH_RSA_PRIVATE_KEY" | ne ""}}'
    - git-clone@8: {}
    - nvm@1:
        inputs:
        - node_version: '18'
    - npm@1:
        title: Install dependencies
        inputs:
        - command: install
    - npm@1:
        title: Build
        inputs:
        - command: run build
    - script@1:
        title: Deploy to GitHub Pages
        inputs:
        - content: |-
            #!/usr/bin/env bash
            set -e
            set -o pipefail

            # Save build output outside the working tree
            cp -r dist/ /tmp/gh-pages-dist

            git config user.email "ci@bitrise.io"
            git config user.name "Bitrise CI"

            # Use HTTPS + token so we don't need SSH write access
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/balazs-wagner/proton.git"

            # Switch to gh-pages branch (clean slate)
            git fetch origin gh-pages || true
            git checkout gh-pages 2>/dev/null || git checkout --orphan gh-pages

            # Remove everything, then copy only the build output
            git rm -rf . --quiet || true
            cp -r /tmp/gh-pages-dist/. .

            git add -A
            git commit -m "Deploy to GitHub Pages [skip ci]" || echo "Nothing to deploy"
            git push origin gh-pages
    - deploy-to-bitrise-io@2: {}
    triggers:
      push:
      - branch: main
      pull_request:
      - source_branch: "*"
    summary: deploy prototypes to GHpages
meta:
  bitrise.io:
    stack: linux-docker-android-22.04
    machine_type_id: g2.linux.large
